<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card" data-kind="{{KIND}}">
      <div class="activity-layout">
        <div class="row-head">
          <span class="icon-wrap">{{ICON_SVG}}</span>
          <span class="repo">{{REPO}}</span>
        </div>
        <div class="action">{{ACTION}}</div>
        <div class="description">{{DESCRIPTION}}</div>
      </div>
      <div class="stats-layout">
        <div class="stats-username repo">{{REPO}}</div>
        <div class="stats-body">
          <div class="stats-main">
            <span class="stats-count">{{DESCRIPTION}}</span>
            <span class="stats-label action">{{ACTION}}</span>
          </div>
          <span class="stats-icon icon-wrap">{{ICON_SVG}}</span>
        </div>
      </div>
      {{SLIDE_DOTS}}
    </div>
  </body>
</html>
